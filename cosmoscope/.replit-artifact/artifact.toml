kind = "web"
previewPath = "/"
title = "CosmoScope"
version = "1.0.0"
id = "artifacts/cosmoscope"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22521

[services.development]
run = "pnpm --filter @workspace/cosmoscope run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cosmoscope", "run", "build" ]
publicDir = "artifacts/cosmoscope/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22521"
BASE_PATH = "/"
